services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infydev
      POSTGRES_PASSWORD: infy.dev
      POSTGRES_DB: twn
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infydev -d twnotifier"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DEV ONLY — NEVER IN PRODUCTION
  twitch-mock:
    container_name: twitch-mock
    build:
      context: .
      dockerfile: twitch-mock/Dockerfile
      network: host
    ports:
      - "7777:7777" # HTTP (OAuth + Helix)
      - "8081:8081" # WebSocket EventSub
      - "3333:3333" # Admin UI
    environment:
      - SITE_BASE_URL=${SITE_BASE_URL:-http://localhost:3005}
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:7777/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
